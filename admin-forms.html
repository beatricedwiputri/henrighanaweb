<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Forms - HENRIG</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      background: #eae7e6;
      font-family: 'Nunito Sans', sans-serif;
    }

    .container {
      max-width: 1000px;
      margin: 60px auto;
      padding: 40px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    nav {
      margin-bottom: 30px;
    }

    nav a {
      margin-right: 20px;
      text-decoration: none;
      font-weight: 600;
      color: black;
    }

    select {
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    #dataList > div {
      background: #f9f9f9;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .admin-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
}

.admin-nav button {
  width: auto;
  padding: 8px 16px;
  border-radius: 8px;
  border: none;
  background: black;
  color: white;
  cursor: pointer;
}

.admin-nav button:hover {
  opacity: 0.85;
}
  </style>
</head>
<body>

<div class="container">

  <nav class="admin-nav">
  <div>
    <a href="admin-blog.html">Blog</a>
    <a href="admin-forms.html">Form Submissions</a>
  </div>

  <button type="button" onclick="logout()">Logout</button>
</nav>

  <h2>Form Submissions</h2>

  <label><strong>Filter by Type:</strong></label>
  <select id="typeFilter">
    <option value="all">All</option>
    <option value="intake">Intake Form</option>
    <option value="website-contact">Contact Form</option>
    <option value="schedule">Schedule</option>
  </select>

  <div id="dataList">Loading data...</div>

</div>

<script>
  // Cek apakah sudah login
  if (localStorage.getItem("adminLoggedIn") !== "true") {
    window.location.href = "admin.html";
  }
</script>

<script type="module" src="admin.js"></script>

<script>
function logout() {
  localStorage.removeItem("adminLoggedIn");
  window.location.href = "admin.html";
}
</script>
</body>
</html>
